name: Python tests

"on":
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Ruff
        run: python -m pip install ruff==0.15.21

      - name: Run Ruff
        run: python -m ruff check .

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: windows-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile application
        run: python -m py_compile main.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
